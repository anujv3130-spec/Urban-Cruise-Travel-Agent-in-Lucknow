<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient - Blue to Green -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#198754;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="14" fill="#1a1a1a" opacity="0.9"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.6"/>
  
  <!-- Main Ship/Cruise Body -->
  <path d="M6 20 L26 20 L24 22 L8 22 Z" fill="url(#primaryGradient)"/>
  <path d="M5 20 L27 20 L25 18 L7 18 Z" fill="url(#primaryGradient)" opacity="0.8"/>
  
  <!-- Ship Details -->
  <path d="M9 18 L23 18 L21 16 L11 16 Z" fill="url(#primaryGradient)" opacity="0.7"/>
  
  <!-- Ship Windows -->
  <circle cx="13" cy="17" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="16" cy="17" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="19" cy="17" r="1" fill="#ffffff" opacity="0.9"/>
  
  <!-- Ship Stack/Chimney -->
  <rect x="14" y="14" width="4" height="2" fill="url(#primaryGradient)" opacity="0.8"/>
  <rect x="15" y="12" width="2" height="2" fill="#ffffff" opacity="0.7"/>
  
  <!-- Waves -->
  <path d="M4 24 Q8 23, 12 24 T20 24 T28 24" stroke="url(#primaryGradient)" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M6 26 Q10 25, 14 26 T22 26 T26 26" stroke="url(#primaryGradient)" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="26" cy="6" r="2" fill="url(#primaryGradient)" opacity="0.9"/>
  <circle cx="26" cy="6" r="1" fill="#ffffff" opacity="0.8"/>
</svg>
