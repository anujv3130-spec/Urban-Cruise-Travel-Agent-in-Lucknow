<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient - Blue to Green -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#198754;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary Gradient - Light Blue -->
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#198754;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="20" cy="20" r="18" fill="#1a1a1a" opacity="0.9"/>
  <circle cx="20" cy="20" r="17" fill="none" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.6"/>
  
  <!-- Main Ship/Cruise Body -->
  <path d="M8 25 L32 25 L30 28 L10 28 Z" fill="url(#primaryGradient)" filter="url(#glow)"/>
  <path d="M6 25 L34 25 L32 22 L8 22 Z" fill="url(#secondaryGradient)"/>
  
  <!-- Ship Details -->
  <path d="M12 22 L28 22 L26 19 L14 19 Z" fill="url(#primaryGradient)" opacity="0.7"/>
  
  <!-- Ship Windows -->
  <circle cx="16" cy="20.5" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="20" cy="20.5" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="24" cy="20.5" r="1.5" fill="#ffffff" opacity="0.9"/>
  
  <!-- Ship Stack/Chimney -->
  <rect x="18" y="16" width="4" height="3" fill="url(#primaryGradient)" opacity="0.8"/>
  <rect x="19" y="14" width="2" height="2" fill="#ffffff" opacity="0.7"/>
  
  <!-- Waves -->
  <path d="M5 30 Q10 28, 15 30 T25 30 T35 30" stroke="url(#primaryGradient)" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M7 33 Q12 31, 17 33 T27 33 T33 33" stroke="url(#secondaryGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="32" cy="8" r="3" fill="url(#primaryGradient)" opacity="0.9"/>
  <circle cx="32" cy="8" r="1.5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Sun Rays -->
  <path d="M32 3 L32 5" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.7"/>
  <path d="M32 11 L32 13" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.7"/>
  <path d="M27 8 L29 8" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.7"/>
  <path d="M35 8 L37 8" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.7"/>
</svg>
