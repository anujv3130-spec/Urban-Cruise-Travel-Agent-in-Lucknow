<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient - Blue to Green -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#198754;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
    
    <!-- Secondary Gradient - Light Blue -->
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#198754;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="40" cy="40" r="36" fill="#1a1a1a" opacity="0.9"/>
  <circle cx="40" cy="40" r="34" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Main Ship/Cruise Body -->
  <path d="M16 50 L64 50 L60 56 L20 56 Z" fill="url(#primaryGradient)" filter="url(#glow)"/>
  <path d="M12 50 L68 50 L64 44 L16 44 Z" fill="url(#secondaryGradient)"/>
  
  <!-- Ship Details -->
  <path d="M24 44 L56 44 L52 38 L28 38 Z" fill="url(#primaryGradient)" opacity="0.7"/>
  
  <!-- Ship Windows -->
  <circle cx="32" cy="41" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="40" cy="41" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="48" cy="41" r="3" fill="#ffffff" opacity="0.9"/>
  
  <!-- Ship Stack/Chimney -->
  <rect x="36" y="32" width="8" height="6" fill="url(#primaryGradient)" opacity="0.8"/>
  <rect x="38" y="28" width="4" height="4" fill="#ffffff" opacity="0.7"/>
  
  <!-- Waves -->
  <path d="M10 60 Q20 56, 30 60 T50 60 T70 60" stroke="url(#primaryGradient)" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M14 66 Q24 62, 34 66 T54 66 T66 66" stroke="url(#secondaryGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="64" cy="16" r="6" fill="url(#primaryGradient)" opacity="0.9"/>
  <circle cx="64" cy="16" r="3" fill="#ffffff" opacity="0.8"/>
  
  <!-- Sun Rays -->
  <path d="M64 6 L64 10" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M64 22 L64 26" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M54 16 L58 16" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M70 16 L74 16" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M58 8 L61 11" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M67 17 L70 20" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M58 24 L61 21" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
  <path d="M67 15 L70 12" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7"/>
</svg>
